name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify content
        run: npm test

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync static files
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            index.html styles.css app.js favicon.svg assets \
            "$DEPLOY_USER@$DEPLOY_HOST:/var/www/jisutech.space/"

      - name: Fix permissions
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "find /var/www/jisutech.space -type d -exec chmod 755 {} \\; && find /var/www/jisutech.space -type f -exec chmod 644 {} \\;"
